name: odev
description: "Müzik Keşif Uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  just_audio: ^0.9.36 # Bu paketin yüklendiğinden emin oluyoruz

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Asset eklerken boşluklara çok dikkat etmelisin!
  assets:
    - assets/ # Tüm müzik ve resimlerin assets klasöründeyse böyle bırakabilirsin